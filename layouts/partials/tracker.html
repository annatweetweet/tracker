<main class="tracker" id="tracker-app">

  {{/* Header */}}
  <header class="tracker__header">
    <div class="tracker__header-inner">
      <div class="tracker__brand">
        <h1 class="tracker__site-title">Anna's Money Tracker</h1>
        <p class="tracker__site-sub">AGB Personal Finance</p>
      </div>
      <nav class="tracker__month-nav" aria-label="Month navigation">
        <button class="tracker__month-btn" id="prev-month" aria-label="Previous month">&#8592;</button>
        <span class="tracker__month-label" id="month-label" aria-live="polite"></span>
        <button class="tracker__month-btn" id="next-month" aria-label="Next month">&#8594;</button>
      </nav>
    </div>
  </header>

  {{/* Summary */}}
  <section class="tracker__summary" aria-label="Monthly summary">
    <div class="summary-card">
      <span class="summary-card__label">Total Spent</span>
      <span class="summary-card__value" id="total-spent">&#8369;0.00</span>
    </div>
    <div class="summary-card">
      <span class="summary-card__label">Entries</span>
      <span class="summary-card__value" id="entry-count">0</span>
    </div>
    <div class="summary-card">
      <span class="summary-card__label">Top Category</span>
      <span class="summary-card__value summary-card__value--sm" id="top-cat">~</span>
    </div>
  </section>

  {{/* Add Expense Form */}}
  <section class="tracker__section">
    <h2 class="tracker__section-title">Add Expense</h2>
    <div class="expense-form" role="form" aria-label="Add a new expense">
      <div class="expense-form__row">
        <div class="expense-form__group">
          <label class="expense-form__label" for="amt">Amount (&#8369;)</label>
          <input
            class="expense-form__input"
            type="number"
            id="amt"
            name="amt"
            placeholder="0.00"
            min="0"
            step="0.01"
            autocomplete="off"
            aria-required="true"
          >
        </div>
        <div class="expense-form__group">
          <label class="expense-form__label" for="cat">Category</label>
          <select class="expense-form__select" id="cat" name="cat" aria-required="true">
            <option value="">Select a category...</option>
            <option value="Health">Health</option>
            <option value="Beauty">Beauty</option>
            <option value="Food / Groceries">Food / Groceries</option>
            <option value="Vacation / Relaxation / Eating Out">Vacation / Relaxation / Eating Out</option>
            <option value="House">House</option>
            <option value="Self Improvement">Self Improvement</option>
            <option value="Gadgets">Gadgets</option>
            <option value="Clothing">Clothing</option>
            <option value="Transportation">Transportation</option>
            <option value="Gifts">Gifts</option>
            <option value="Government Savings">Government Savings</option>
          </select>
        </div>
      </div>
      <div class="expense-form__group expense-form__group--full">
        <label class="expense-form__label" for="notes">Notes</label>
        <textarea
          class="expense-form__textarea"
          id="notes"
          name="notes"
          placeholder="What was it for?"
          rows="2"
        ></textarea>
      </div>
      <p class="expense-form__error" id="form-error" role="alert" aria-live="assertive" hidden></p>
      <button class="btn btn--primary" id="add-btn" type="button">Add Expense</button>
    </div>
  </section>

  {{/* Category Breakdown */}}
  <section class="tracker__section" id="chart-section" hidden aria-label="Spending by category">
    <h2 class="tracker__section-title">By Category</h2>
    <div class="cat-chart" id="cat-chart" aria-label="Category spending bars"></div>
  </section>

  {{/* Expense Log */}}
  <section class="tracker__section">
    <h2 class="tracker__section-title">This Month</h2>
    <div class="expense-list" id="expense-list" aria-label="Expense log" aria-live="polite">
      <p class="expense-list__empty">No expenses logged yet.</p>
    </div>
  </section>

</main>
