baseURL = "https://agb.com/"
languageCode = "en-us"
title = "Anna's Finances Tracker"

# Single-page app: no taxonomies or RSS feeds needed
disableKinds = ["taxonomy", "term", "rss"]

[permalinks]
  [permalinks.page]
    tracker = "/tracker/:slug/"

[params]
  description = "Personal expense tracker for AGB"
  author = "Anna"
  theme = "default"  # set to "blue" to use the Cobalt & Butter theme

[build]
  writeStats = true

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = true
